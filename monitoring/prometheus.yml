global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "flink-jobmanager"
    static_configs:
      - targets: ["flink-jobmanager:9249"]
    relabel_configs:
      - target_label: instance
        replacement: "jobmanager"

  - job_name: "flink-taskmanager"
    static_configs:
      - targets: ["flink-taskmanager:9249"]
    relabel_configs:
      - target_label: instance
        replacement: "taskmanager"

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "bus-api"
    static_configs:
      - targets: ["api:8000"]
